<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Model Chat Agent</title>
  <meta name="description" content="Chat with your locally hosted LLM via a sleek web UI.">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="chat-window" id="chatWindow">
      <!-- Messages will be injected here -->
    </section>
    <form class="input-area" id="chatForm">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" required />
      <button type="submit" aria-label="Send message">🚀</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
